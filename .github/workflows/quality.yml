name: Quality gates

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript
        run: bun run typecheck
      - name: ESLint
        run: bun run lint
      - name: Expo dependency and config audit
        run: bunx expo-doctor
      - name: Android production bundle
        run: bun run export:android

  database:
    name: Database security tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}
      - name: Start local Supabase
        run: supabase start
      - name: Run pgTAP suite
        run: supabase test db
